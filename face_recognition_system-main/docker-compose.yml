version: '3.8'

services:
  backend:
    build: ./backend
    container_name: face-recognition-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/instance:/app/instance
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5000
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:////app/instance/attendance.db
    networks:
      - face-recognition-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: face-recognition-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - face-recognition-network
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      target: builder
    container_name: face-recognition-dev
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    networks:
      - face-recognition-network
    restart: unless-stopped

networks:
  face-recognition-network:
    driver: bridge
